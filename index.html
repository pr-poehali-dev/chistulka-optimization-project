<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Химчистка мебели в Краснодаре | Аренда Чистоты</title>
    <meta name="description" content="Профессиональная химчистка диванов, кресел, матрасов, ковров в Краснодаре. Выезд на дом. ☎ 8 918 968-28-82">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; }
        .header { background: linear-gradient(135deg, #0cb8a0 0%, #0a9c88 100%); color: white; padding: 20px; text-align: center; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .hero { text-align: center; padding: 60px 20px; background: #f5f5f5; border-radius: 12px; margin-bottom: 40px; }
        h1 { font-size: 48px; margin-bottom: 20px; color: #0cb8a0; }
        .phone { font-size: 32px; font-weight: bold; margin: 20px 0; }
        .phone a { color: #0cb8a0; text-decoration: none; }
        .form-container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #0cb8a0; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
        button:hover { background: #0a9c88; }
        .message { margin-top: 20px; padding: 10px; border-radius: 8px; display: none; }
        .success { background: #d4edda; color: #155724; display: block; }
        .error { background: #f8d7da; color: #721c24; display: block; }
        @media (max-width: 768px) {
            h1 { font-size: 32px; }
            .phone { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <h2>Аренда Чистоты</h2>
            <p>Профессиональная химчистка мебели в Краснодаре</p>
        </div>
    </div>

    <div class="container">
        <div class="hero">
            <h1>Химчистка мебели в Краснодаре</h1>
            <p>Диваны | Кресла | Матрасы | Ковры | Автомобили</p>
            <div class="phone">
                <a href="tel:+79189682882">📞 8 (918) 968-28-82</a>
            </div>
            <p>✅ Выезд на дом ✅ Сушка 2-4 часа ✅ Безопасные средства</p>
        </div>

        <div class="form-container">
            <h3 style="text-align: center; margin-bottom: 20px;">Оставить заявку</h3>
            <form id="orderForm">
                <input type="text" id="name" placeholder="Ваше имя *" required>
                <input type="tel" id="phone" placeholder="Номер телефона *" required>
                <select id="furniture" multiple size="3">
                    <option value="Диван">Диван</option>
                    <option value="Кресло">Кресло</option>
                    <option value="Матрас">Матрас</option>
                    <option value="Ковер">Ковер</option>
                    <option value="Автомобиль">Автомобиль</option>
                </select>
                <small style="display: block; margin-top: -5px; color: #888;">Для выбора нескольких зажмите Ctrl</small>
                <input type="text" id="time" placeholder="Удобное время звонка">
                <textarea id="comment" rows="3" placeholder="Комментарий"></textarea>
                <button type="submit" id="submitBtn">Отправить заявку</button>
                <div id="message" class="message"></div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'https://functions.poehali.dev/e0c4663b-8df6-4eed-958d-8a57089eb58a';
        
        document.getElementById('orderForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const furnitureSelect = document.getElementById('furniture');
            const furniture = Array.from(furnitureSelect.selectedOptions).map(opt => opt.value);
            const time = document.getElementById('time').value.trim();
            const comment = document.getElementById('comment').value.trim();
            const messageDiv = document.getElementById('message');
            const submitBtn = document.getElementById('submitBtn');
            
            if (!name || !phone) {
                showMessage('Пожалуйста, заполните имя и телефон', 'error');
                return;
            }
            
            if (phone.replace(/\D/g, '').length < 10) {
                showMessage('Пожалуйста, введите корректный номер телефона', 'error');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Отправка...';
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, phone, furniture, time, comment })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage('✅ Заявка успешно отправлена! Мы свяжемся с вами.', 'success');
                    document.getElementById('orderForm').reset();
                    
                    // Отправка в Яндекс.Метрику
                    if (typeof ym !== 'undefined') {
                        ym(101026698, 'reachGoal', 'form_submit');
                    }
                } else {
                    throw new Error(data.error || 'Ошибка отправки');
                }
            } catch (error) {
                showMessage('❌ Ошибка при отправке. Позвоните нам: 8 (918) 968-28-82', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Отправить заявку';
                setTimeout(() => {
                    messageDiv.className = 'message';
                    messageDiv.style.display = 'none';
                }, 5000);
            }
        });
        
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
        }
    </script>
</body>
</html>
